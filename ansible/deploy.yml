---
- name: Déploiement de l'application e-commerce
  hosts: web
  become: yes
  gather_facts: no
  vars:
    app_dir: /opt/ecommerce

  tasks:

    - name: Mise à jour des paquets
      command: yum update -y
      register: result
      changed_when: result.rc == 0

    - name: Installer Docker
      command: yum install -y docker
      register: result
      changed_when: result.rc == 0

    - name: Démarrer Docker
      command: systemctl start docker
      register: result
      changed_when: result.rc == 0

    - name: Activer Docker au démarrage
      command: systemctl enable docker
      register: result
      changed_when: result.rc == 0

    - name: Ajouter ec2-user au groupe docker
      command: usermod -aG docker ec2-user
      register: result
      changed_when: result.rc == 0

    - name: Installer Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Créer le répertoire de l'application
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        mode: '0755'

    - name: Copier docker-compose.yml
      copy:
        src: docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: ec2-user

    - name: Copier nginx.conf
      copy:
        src: nginx.conf
        dest: "{{ app_dir }}/nginx.conf"
        owner: ec2-user

    - name: Créer le dossier app
      file:
        path: "{{ app_dir }}/app"
        state: directory
        owner: ec2-user
        mode: '0755'

    - name: Copier server.js
      copy:
        src: app/server.js
        dest: "{{ app_dir }}/app/server.js"
        owner: ec2-user

    - name: Copier package.json
      copy:
        src: app/package.json
        dest: "{{ app_dir }}/app/package.json"
        owner: ec2-user

    - name: Lancer les conteneurs Docker
      shell: |
        cd {{ app_dir }}
        /usr/local/bin/docker-compose up -d
      become_user: ec2-user
