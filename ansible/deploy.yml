---
- name: Déploiement de l'application e-commerce
  hosts: web
  become: yes
  gather_facts: no
  vars:
    app_dir: /opt/ecommerce

  tasks:

    - name: Installer Python 3
      raw: yum install -y python3 python3-pip
      register: result
      changed_when: result.rc == 0

    - name: Mise à jour des paquets
      raw: yum update -y
      register: result
      changed_when: result.rc == 0

    - name: Installer Docker
      raw: yum install -y docker
      register: result
      changed_when: result.rc == 0

    - name: Démarrer Docker
      raw: systemctl start docker
      register: result
      changed_when: result.rc == 0

    - name: Activer Docker au démarrage
      raw: systemctl enable docker
      register: result
      changed_when: result.rc == 0

    - name: Ajouter ec2-user au groupe docker
      raw: usermod -aG docker ec2-user
      register: result
      changed_when: result.rc == 0

    - name: Installer Docker Compose
      raw: curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose && chmod +x /usr/local/bin/docker-compose
      register: result
      changed_when: result.rc == 0

    - name: Créer le répertoire de l'application
      raw: mkdir -p {{ app_dir }}
      register: result
      changed_when: result.rc == 0

    - name: Créer le dossier app
      raw: mkdir -p {{ app_dir }}/app
      register: result
      changed_when: result.rc == 0

    - name: Copier docker-compose.yml
      raw: |
        cat > {{ app_dir }}/docker-compose.yml << 'DOCKEREOF'
        version: '3.8'
        services:
          mongodb:
            image: mongo:6
            container_name: mongodb
            restart: always
            volumes:
              - mongo_data:/data/db
            networks:
              - app_network
          app:
            image: node:18-alpine
            container_name: nodejs_app
            working_dir: /app
            restart: always
            environment:
              - MONGO_URL=mongodb://mongodb:27017/ecommerce
              - PORT=3000
            volumes:
              - ./app:/app
            command: sh -c "npm install && node server.js"
            depends_on:
              - mongodb
            networks:
              - app_network
          nginx:
            image: nginx:alpine
            container_name: nginx_proxy
            restart: always
            ports:
              - "80:80"
            volumes:
              - ./nginx.conf:/etc/nginx/nginx.conf
            depends_on:
              - app
            networks:
              - app_network
        volumes:
          mongo_data:
        networks:
          app_network:
            driver: bridge
        DOCKEREOF
      register: result
      changed_when: result.rc == 0

    - name: Copier nginx.conf
      raw: |
        cat > {{ app_dir }}/nginx.conf << 'NGINXEOF'
        events {
            worker_connections 1024;
        }
        http {
            server {
                listen 80;
                location / {
                    proxy_pass http://app:3000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
        }
        NGINXEOF
      register: result
      changed_when: result.rc == 0

    - name: Copier server.js
      raw: |
        cat > {{ app_dir }}/app/server.js << 'JSAPPEOF'
        const express = require('express');
        const mongoose = require('mongoose');
        const app = express();

        app.use(express.json());

        mongoose.connect(process.env.MONGO_URL || 'mongodb://mongodb:27017/ecommerce');

        const Product = mongoose.model('Product', {
          name: String,
          price: Number
        });

        const initProducts = async () => {
          const count = await Product.countDocuments();
          if (count === 0) {
            await Product.insertMany([
              { name: 'Laptop', price: 1200 },
              { name: 'Phone', price: 800 },
              { name: 'Tablet', price: 500 },
              { name: 'Headphones', price: 150 },
              { name: 'Smartwatch', price: 250 }
            ]);
            console.log('✅ Produits initialisés dans MongoDB');
          }
        };

        app.get('/api/products', async (req, res) => {
          try {
            const products = await Product.find();
            res.json(products);
          } catch (error) {
            res.status(500).json({ error: 'Erreur serveur' });
          }
        });

        app.post('/api/products', async (req, res) => {
          try {
            const { name, price } = req.body;
            if (!name || !price) {
              return res.status(400).json({ error: 'name et price sont requis' });
            }
            const newProduct = new Product({ name, price });
            await newProduct.save();
            res.status(201).json(newProduct);
          } catch (error) {
            res.status(500).json({ error: 'Erreur serveur' });
          }
        });

        app.get('/', async (req, res) => {
          try {
            const products = await Product.find();

            const getIcon = (name) => {
              const icons = {
                'Laptop': '💻',
                'Phone': '📱',
                'Tablet': '📟',
                'Headphones': '🎧',
                'Smartwatch': '⌚'
              };
              return icons[name] || '📦';
            };

            const escapeHtml = (str) => {
              return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
              });
            };

            let productsHtml = '';
            for (const p of products) {
              productsHtml += '\n                <div class="product-card">\n                  <div class="product-icon">' + getIcon(p.name) + '</div>\n                  <div class="product-name">' + escapeHtml(p.name) + '</div>\n                  <div class="product-price">' + p.price + '</div>\n                  <button class="buy-btn" onclick="alert(\'' + escapeHtml(p.name) + ' ajouté au panier !\')">\n                    🛒 Ajouter au panier\n                  </button>\n                </div>';
            }

            const html = '<!DOCTYPE html>\n<html lang="fr">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>E-Commerce Store</title>\n  <style>\n    * { margin: 0; padding: 0; box-sizing: border-box; }\n    body {\n      font-family: \'Segoe UI\', Tahoma, Geneva, Verdana, sans-serif;\n      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n      min-height: 100vh;\n      padding: 20px;\n    }\n    .container { max-width: 1200px; margin: 0 auto; }\n    .header { text-align: center; color: white; margin-bottom: 40px; padding: 40px 20px; }\n    .header h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }\n    .header p { font-size: 1.2rem; opacity: 0.9; }\n    .products-grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));\n      gap: 25px;\n      margin-bottom: 40px;\n    }\n    .product-card {\n      background: white;\n      border-radius: 15px;\n      padding: 25px;\n      text-align: center;\n      transition: transform 0.3s ease, box-shadow 0.3s ease;\n      box-shadow: 0 4px 6px rgba(0,0,0,0.1);\n    }\n    .product-card:hover {\n      transform: translateY(-5px);\n      box-shadow: 0 10px 30px rgba(0,0,0,0.2);\n    }\n    .product-icon { font-size: 3rem; margin-bottom: 15px; }\n    .product-name { font-size: 1.5rem; font-weight: 600; color: #333; margin-bottom: 10px; }\n    .product-price { font-size: 2rem; font-weight: bold; color: #667eea; margin-bottom: 15px; }\n    .product-price::before { content: \'$\'; font-size: 1.2rem; }\n    .buy-btn {\n      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n      color: white;\n      border: none;\n      padding: 12px 30px;\n      border-radius: 25px;\n      font-size: 1rem;\n      cursor: pointer;\n      transition: opacity 0.3s ease;\n    }\n    .buy-btn:hover { opacity: 0.9; }\n    .footer { text-align: center; color: white; padding: 20px; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.2); }\n    .badge { display: inline-block; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px; }\n    .api-link { color: white; text-decoration: none; border-bottom: 1px dashed white; }\n    .api-link:hover { border-bottom: 1px solid white; }\n    @media (max-width: 768px) {\n      .header h1 { font-size: 2rem; }\n      .products-grid { grid-template-columns: 1fr; }\n    }\n  </style>\n</head>\n<body>\n  <div class="container">\n    <div class="header">\n      <h1>🛍️ E-Commerce Store</h1>\n      <p>Découvrez nos meilleurs produits</p>\n    </div>\n    <div class="products-grid">\n' + productsHtml + '\n    </div>\n    <div class="footer">\n      <p>📦 Données stockées dans MongoDB</p>\n      <div class="badge">\n        🔗 API JSON : <a href="/api/products" class="api-link">/api/products</a>\n      </div>\n    </div>\n  </div>\n</body>\n</html>';
            res.send(html);
          } catch (error) {
            console.error(error);
            res.send('<h1>Erreur</h1><p>Impossible de charger les produits</p>');
          }
        });

        initProducts();

        const PORT = process.env.PORT || 3000;
        app.listen(PORT, () => console.log(`Server running on port ${PORT}`));
        JSAPPEOF
      register: result
      changed_when: result.rc == 0

    - name: Copier package.json
      raw: |
        cat > {{ app_dir }}/app/package.json << 'PKGEOF'
        {
          "name": "ecommerce-app",
          "version": "1.0.0",
          "dependencies": {
            "express": "^4.18.0",
            "mongoose": "^8.0.0"
          }
        }
        PKGEOF
      register: result
      changed_when: result.rc == 0

    - name: Lancer les conteneurs Docker
      raw: cd {{ app_dir }} && /usr/local/bin/docker-compose up -d
      register: result
      changed_when: result.rc == 0