version: '3.8'

services:

  # Base de données MongoDB
  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  # Application Node.js
  app:
    image: node:18-alpine
    container_name: nodejs_app
    working_dir: /app
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017/ecommerce
      - PORT=3000
    volumes:
      - ./app:/app
    command: sh -c "npm install && node server.js"
    depends_on:
      - mongodb
    networks:
      - app_network

  # Reverse proxy Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
