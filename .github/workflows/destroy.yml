name: Destroy AWS Infrastructure (Complet)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "CONFIRM" pour confirmer la suppression TOTALE'
        required: true
        type: string

jobs:
  destroy-all:
    name: Destroy ALL AWS Resources
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Vérification de confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CONFIRM" ]; then
            echo "❌ Veuillez taper CONFIRM pour confirmer la suppression"
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -var="key_name=${{ secrets.AWS_KEY_NAME }}" -auto-approve
        continue-on-error: true

      - name: Nettoyage forcé des ressources (ordre correct)
        run: |
          echo "========================================="
          echo "🧹 ÉTAPE 1/5: Suppression des instances EC2..."
          echo "========================================="
          for instance_id in $(aws ec2 describe-instances --filters "Name=tag:Name,Values=EC2-Web-*" "Name=instance-state-name,Values=running,pending,stopping,stopped" --query 'Reservations[*].Instances[*].InstanceId' --output text); do
            echo "  Terminaison de l'instance: $instance_id"
            aws ec2 terminate-instances --instance-ids $instance_id
          done

          echo ""
          echo "========================================="
          echo "🧹 ÉTAPE 2/5: Suppression des Load Balancers..."
          echo "========================================="
          for alb_arn in $(aws elbv2 describe-load-balancers --names ecommerce-alb --query 'LoadBalancers[*].LoadBalancerArn' --output text 2>/dev/null); do
            echo "  Suppression de l'ALB: $alb_arn"
            aws elbv2 delete-load-balancer --load-balancer-arn $alb_arn
          done

          echo ""
          echo "========================================="
          echo "🧹 ÉTAPE 3/5: Suppression des Target Groups..."
          echo "========================================="
          for tg_arn in $(aws elbv2 describe-target-groups --names ecommerce-tg --query 'TargetGroups[*].TargetGroupArn' --output text 2>/dev/null); do
            echo "  Suppression du Target Group: $tg_arn"
            aws elbv2 delete-target-group --target-group-arn $tg_arn
          done

          echo ""
          echo "========================================="
          echo "🧹 ÉTAPE 4/5: Suppression des Security Groups..."
          echo "========================================="
          for sg_id in $(aws ec2 describe-security-groups --filters "Name=group-name,Values=alb-sg,ec2-sg" --query 'SecurityGroups[*].GroupId' --output text 2>/dev/null); do
            echo "  Suppression du Security Group: $sg_id"
            aws ec2 delete-security-group --group-id $sg_id 2>/dev/null || echo "    Impossible de supprimer $sg_id (peut-être utilisé)"
          done

          echo ""
          echo "========================================="
          echo "🧹 ÉTAPE 5/5: Suppression des VPC..."
          echo "========================================="
          for vpc_id in $(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=ecommerce-vpc" --query 'Vpcs[*].VpcId' --output text); do
            echo "  Suppression des sous-réseaux du VPC: $vpc_id"
            for subnet_id in $(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$vpc_id" --query 'Subnets[*].SubnetId' --output text); do
              echo "    Suppression du sous-réseau: $subnet_id"
              aws ec2 delete-subnet --subnet-id $subnet_id 2>/dev/null
            done
            
            echo "  Suppression de la route table principale du VPC: $vpc_id"
            for route_table_id in $(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$vpc_id" --query 'RouteTables[?Associations[0].Main==`false`].RouteTableId' --output text); do
              echo "    Suppression de la route table: $route_table_id"
              aws ec2 delete-route-table --route-table-id $route_table_id 2>/dev/null
            done
            
            echo "  Suppression de l'Internet Gateway du VPC: $vpc_id"
            for igw_id in $(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$vpc_id" --query 'InternetGateways[*].InternetGatewayId' --output text); do
              echo "    Détachement et suppression de l'IGW: $igw_id"
              aws ec2 detach-internet-gateway --internet-gateway-id $igw_id --vpc-id $vpc_id 2>/dev/null
              aws ec2 delete-internet-gateway --internet-gateway-id $igw_id 2>/dev/null
            done
            
            echo "  Suppression finale du VPC: $vpc_id"
            aws ec2 delete-vpc --vpc-id $vpc_id 2>/dev/null || echo "    Impossible de supprimer $vpc_id"
          done

          echo ""
          echo "========================================="
          echo "✅ Nettoyage terminé !"
          echo "========================================="
