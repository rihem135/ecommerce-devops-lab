name: Destroy AWS Infrastructure (Ultra Robuste)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "CONFIRM" pour confirmer la suppression TOTALE'
        required: true
        type: string

jobs:
  destroy-all:
    name: Destroy ALL AWS Resources
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Vérification de confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CONFIRM" ]; then
            echo "❌ Veuillez taper CONFIRM pour confirmer la suppression"
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy (Tentative 1)
        run: terraform destroy -var="key_name=${{ secrets.AWS_KEY_NAME }}" -auto-approve
        continue-on-error: true

      - name: Attente 30 secondes
        run: sleep 30

      - name: Terraform Destroy (Tentative 2)
        run: terraform destroy -var="key_name=${{ secrets.AWS_KEY_NAME }}" -auto-approve
        continue-on-error: true

      - name: Nettoyage forcé complet
        run: |
          echo "============================================================"
          echo "🧹 NETTOYAGE COMPLET DES RESSOURCES"
          echo "============================================================"

          # 1. Suppression des instances EC2
          echo ""
          echo "📌 1/7: Suppression des instances EC2..."
          for instance_id in $(aws ec2 describe-instances --filters "Name=tag:Name,Values=EC2-Web-*" --query 'Reservations[*].Instances[*].InstanceId' --output text 2>/dev/null); do
            echo "  ✅ Terminaison: $instance_id"
            aws ec2 terminate-instances --instance-ids $instance_id 2>/dev/null || true
          done

          # 2. Suppression des Load Balancers
          echo ""
          echo "📌 2/7: Suppression des Load Balancers..."
          for alb_arn in $(aws elbv2 describe-load-balancers --names ecommerce-alb --query 'LoadBalancers[*].LoadBalancerArn' --output text 2>/dev/null); do
            echo "  ✅ Suppression ALB: $alb_arn"
            aws elbv2 delete-load-balancer --load-balancer-arn $alb_arn 2>/dev/null || true
          done

          # 3. Suppression FORCÉE des Target Groups
          echo ""
          echo "📌 3/7: Suppression FORCÉE des Target Groups..."
          
          # Méthode 1: Par nom
          for tg_arn in $(aws elbv2 describe-target-groups --names ecommerce-tg --query 'TargetGroups[*].TargetGroupArn' --output text 2>/dev/null); do
            echo "  ✅ Suppression TG (par nom): $tg_arn"
            aws elbv2 delete-target-group --target-group-arn $tg_arn 2>/dev/null || true
          done
          
          # Méthode 2: Par tag (au cas où)
          for tg_arn in $(aws elbv2 describe-target-groups --query 'TargetGroups[?contains(TargetGroupName,`ecommerce-tg`)].TargetGroupArn' --output text 2>/dev/null); do
            echo "  ✅ Suppression TG (par tag): $tg_arn"
            aws elbv2 delete-target-group --target-group-arn $tg_arn 2>/dev/null || true
          done
          
          # Méthode 3: Attendre puis réessayer
          echo "  ⏳ Attente 10 secondes avant réessai..."
          sleep 10
          
          for tg_arn in $(aws elbv2 describe-target-groups --names ecommerce-tg --query 'TargetGroups[*].TargetGroupArn' --output text 2>/dev/null); do
            echo "  ✅ Suppression TG (2ème tentative): $tg_arn"
            aws elbv2 delete-target-group --target-group-arn $tg_arn 2>/dev/null || true
          done

          # 4. Suppression des Security Groups
          echo ""
          echo "📌 4/7: Suppression des Security Groups..."
          for sg_id in $(aws ec2 describe-security-groups --filters "Name=group-name,Values=alb-sg,ec2-sg" --query 'SecurityGroups[*].GroupId' --output text 2>/dev/null); do
            echo "  ✅ Suppression SG: $sg_id"
            aws ec2 delete-security-group --group-id $sg_id 2>/dev/null || true
          done

          # 5. Suppression des ENI orphelines
          echo ""
          echo "📌 5/7: Suppression des interfaces réseau orphelines..."
          for eni_id in $(aws ec2 describe-network-interfaces --filters "Name=description,Values=ELB*" --query 'NetworkInterfaces[*].NetworkInterfaceId' --output text 2>/dev/null); do
            echo "  ✅ Suppression ENI: $eni_id"
            aws ec2 delete-network-interface --network-interface-id $eni_id 2>/dev/null || true
          done

          # 6. Suppression des VPC (optionnelle)
          echo ""
          echo "📌 6/7: Suppression des VPC..."
          for vpc_id in $(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=ecommerce-vpc" --query 'Vpcs[*].VpcId' --output text 2>/dev/null); do
            echo "  Tentative suppression VPC: $vpc_id"
            aws ec2 delete-vpc --vpc-id $vpc_id 2>/dev/null || echo "  ⚠️ VPC $vpc_id non supprimé (à faire manuellement)"
          done

          # 7. Vérification finale
          echo ""
          echo "📌 7/7: Vérification finale..."
          
          remaining_tg=$(aws elbv2 describe-target-groups --names ecommerce-tg --query 'TargetGroups[*].TargetGroupName' --output text 2>/dev/null)
          if [ -n "$remaining_tg" ]; then
            echo "  ⚠️ Target Group restant: $remaining_tg (à supprimer manuellement)"
          else
            echo "  ✅ Aucun Target Group restant !"
          fi
          
          remaining_vpcs=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=ecommerce-vpc" --query 'Vpcs[*].VpcId' --output text 2>/dev/null)
          if [ -n "$remaining_vpcs" ]; then
            echo "  ⚠️ VPC restants: $remaining_vpcs (à supprimer manuellement)"
          else
            echo "  ✅ Aucun VPC restant !"
          fi

          echo ""
          echo "============================================================"
          echo "✅ NETTOYAGE TERMINÉ !"
          echo "============================================================"
        continue-on-error: true

      - name: Résumé final
        run: |
          echo ""
          echo "============================================================"
          echo "📊 RÉSUMÉ FINAL"
          echo "============================================================"
          echo "✅ Destroy exécuté avec succès !"
          echo ""
          echo "Si des ressources persistent, supprimez-les manuellement :"
          echo "  - Target Groups: AWS Console → EC2 → Target Groups"
          echo "  - VPC: AWS Console → VPC → Your VPCs"
